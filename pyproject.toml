[project]
  name            = "scheduledreportaggregator"
  version         = "1.1.12"
  description     = "Add your description here"
  readme          = "README.md"
  requires-python = ">=3.14"
  dependencies    = [
    "aiologic>=0.16.0",
    "apscheduler>=3.11.2",
    "gspread>=6.2.1",
    "pandas[performance]>=3.0.3",
    "paramiko>=5.0.0",
    "pydantic-settings>=2.14.1",
    "python-dateutil>=2.9.0.post0",
    "rich>=15.0.0",
    "sft-ext[sftp]==1.2.0",
    "timeclock-entry-processor>=1.7.3",
  ]

[dependency-groups]
  dev = [
    "apscheduler-stubs>=0.1.0.dev2",
    "pandas-stubs>=3.0.3.260530",
    "poethepoet>=0.46.0",
    "pytest>=9.0.3",
    "types-python-dateutil>=2.9.0.20260518",
  ]

[tool.poe.tasks.bump]
  help        = "Bump version, commit, tag, and push. Usage: poe bump [major|minor|patch]"
  interpreter = "bash"
  shell       = """
    set -e
    NEW_VERSION=$(uv version --bump "${bump_type}" | awk '{print $NF}')
    git add pyproject.toml uv.lock
    git commit -m "Bump version to ${NEW_VERSION}"
    git tag -a "v${NEW_VERSION}" -m "Version ${NEW_VERSION}"
    git push --follow-tags
  """

  [[tool.poe.tasks.bump.args]]
    name       = "bump_type"
    positional = true
    help       = "Version component to bump: major, minor, or patch"

[tool.ruff]
  extend = "../pyproject.toml"

  src = ["./src"]

[tool.uv]
  environments = [
    "sys_platform == 'linux'",
    "sys_platform == 'win32'",
  ]

  [tool.uv.sources]
    sft-ext                   = [
      { git = "https://github.com/AetherBreaker/sft_ext", marker = "sys_platform == 'linux'", tag = "v1.0.0" },
      { path = "../sft_ext", editable = true, marker = "sys_platform == 'win32'" },
    ]
    timeclock-entry-processor = [
      { git = "https://github.com/AetherBreaker/timeclock_entry_processor", marker = "sys_platform == 'linux'", tag = "v1.7.0" },
      { path = "../timeclock_entry_processor", editable = true, marker = "sys_platform == 'win32'" },
    ]
